<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown to PDF</title>
    <link rel="stylesheet" href="./styles.css?v=citrus-rich-1">
  </head>
  <body>
    <div class="theme-background" aria-hidden="true">
      <div class="theme-background-layer is-current"></div>
      <div class="theme-background-layer is-next"></div>
    </div>

    <header class="app-header glass-card">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">M</span>
        <div>
          <h1>Markdown to PDF</h1>
          <p>Convert Markdown into a clean, designed PDF.</p>
        </div>
      </div>
      <div class="header-actions">
        <label class="file-button" title="Open Markdown file">
          <input id="fileInput" type="file" accept=".md,.markdown,text/markdown,text/plain">
          <span aria-hidden="true">Open</span>
        </label>
        <button id="printButton" type="button" class="primary" title="Print or save as PDF">PDF</button>
      </div>
    </header>

    <main class="workspace">
      <section class="editor-pane glass-card" aria-label="Markdown editor">
        <div class="pane-toolbar">
          <label for="markdownInput">Markdown</label>
          <div class="control-row">
            <label for="themeSelect">Theme</label>
            <select id="themeSelect"></select>
          </div>
        </div>
        <textarea id="markdownInput" spellcheck="false" placeholder="ここにマークダウンテキストを入力"></textarea>
      </section>

      <section class="preview-pane glass-card" aria-label="PDF preview">
        <div class="pane-toolbar">
          <span id="documentTitle">Preview</span>
        </div>
        <div class="paper-scroll">
          <article id="preview" class="paper theme-business"></article>
        </div>
      </section>
    </main>

    <script src="./app.js?v=citrus-rich-1"></script>
  </body>
</html>
